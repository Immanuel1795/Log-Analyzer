<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ServiceNow Log Analyzer</title>

    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">

    <header>
        <h1>📄 ServiceNow Log Analyzer</h1>
        <p>Analyze ServiceNow Export Logs</p>
    </header>

    <!-- Log Input -->
    <section class="card">

        <h2>Paste Log</h2>

        <textarea
            id="logInput"
            placeholder="Paste your ServiceNow export log here..."></textarea>

        <div class="button-group">

            <button id="analyzeButton">
                Analyze Log
            </button>

            <button id="clearButton">
                Clear
            </button>

        </div>

    </section>

    <!-- Summary -->
    <section class="summary">

        <div class="summary-card total">
            <h3>Total</h3>
            <span id="totalExports">0</span>
        </div>

        <div class="summary-card success">
            <h3>Success</h3>
            <span id="successCount">0</span>
        </div>

        <div class="summary-card warning">
            <h3>Warning</h3>
            <span id="warningCount">0</span>
        </div>

        <div class="summary-card failed">
            <h3>Failed</h3>
            <span id="failedCount">0</span>
        </div>

    </section>

    <!-- Results -->

    <section class="card">

        <h2>Analysis Results</h2>

        <div id="results">

            <table id="resultsTable">

                <thead>

                <tr>

                    <th>Export</th>
                    <th>Table</th>
                    <th>Declared</th>
                    <th>Received</th>
                    <th>Portions</th>
                    <th>LEFT</th>
                    <th>Status</th>

                </tr>

                </thead>

                <tbody id="resultsBody">

                <!-- JavaScript inserts rows here -->

                </tbody>

            </table>

        </div>

    </section>

</div>

<script src="script.js"></script>

</body>
</html>
